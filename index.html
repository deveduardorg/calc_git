<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div id="container">
      <label for="tipoLixo">Escolha um item para reciclar</label>
      <select name="" id="tipoLixo">
        <option value="" disabled selected>Clique para escolher</option>
        <option value="Smartphone">Smartphone</option>
        <option value="Notebook">Notebook</option>
        <option value="Geladeira">Geladeira</option>
        <option value="CPUnontebook">Notebook (CPU)</option>
        <option value="Ar">Ar-condicionado</option>
        <option value="Micro">Micro-ondas</option>
        <option value="Lavadora">Lavadora de Roupas</option>
        <option value="Impressora">Impressora</option>
        <option value="Pilhas">Pilha</option>
      </select>

      <label for="quantidade">Digite a quantidade</label>
      <input
        type="number"
        id="quantidade"
        name="quantidade"
        min="0"
        max="999"
        step="2"
        placeholder="Digite um número de 1-999."
      />
      <button id="reset" onclick="reset()">Limpar Seleção</button>
      <button id="enviar" onclick="CalcularImpacto()">
        Calcular o Estrago Ambiental Evitado
      </button>

      <div id="aviso" style="display: none">
        <div id="conteudoAviso"></div>
      </div>
    </div>
    <script>
      function CalcularImpacto() {
        const dadosReciclagem = {
          Smartphone: {
            v1: 75,
            v2: 600,
            txt1: "kg de metal bruto deixaram de ser extraídos",
            txt2: "litros d'água deixaram de ser consumidos",
          },
          Notebook: {
            v1: 25,
            txt1: "kg de CO2 deixam de serem emitidos à atmosfera",
          },
          Geladeira: {
            v1: 45,
            txt1: "kg (aço e cobre) podem ser poupados da natureza",
          },
          CPUnontebook: {
            v1: 0.35,
            v2: 32,
            txt1: "g de ouro é poupado da natureza",
            txt2: " litros d'água deixam de serem consumidos",
          },
          Ar: {
            v1: 30,
            txt1: "kg de metais preciosos são poupados da natureza",
          },
          Micro: {
            v1: 12,
            v2: 35,
            txt1: "kg de ferro e cobre são recuperados",
            txt2: "kg de minérios brutos deixam de serem extraídos",
          },
          Lavadora: {
            v1: 40,
            v2: 15,
            txt1: "kg de metais e plásticos são recuperados",
            txt2: "dias de energia para abastecer uma casa média são economizadas",
          },
          Impressora: {
            v1: 4,
            v2: 6,
            txt1: "kg de plásticos são recuperados",
            txt2: "litros de petróleo são poupados do refino para fabricação de plástico",
          },
          Pilhas: {
            v1: 600000,
            txt1: "litros de água são postos em segurança, devido ao eventual vazamento de eletrólitos e metais pesados",
          },
        };

        const ItemSelecionado = document.getElementById("tipoLixo").value;
        const qtd = parseInt(document.getElementById("quantidade").value);
        const divAviso = document.getElementById("aviso");
        const conteudoAviso = document.getElementById("conteudoAviso");

        if (!ItemSelecionado || qtd <= 0) {
          alert("Verifique os campos selecionados!");
          return;
        }

        const info = dadosReciclagem[ItemSelecionado];
        const conta1 = info.v1 * qtd;
        const result1 = conta1.toLocaleString("pt-BR");

        let mensagemFinal = `Ao reciclar ${qtd} unidade(s), ${result1} ${info.txt1}`;

        if (info.v2) {
          const conta2 = info.v2 * qtd;
          const result2 = conta2.toLocaleString("pt-BR");
          mensagemFinal += ` e ${result2} ${info.txt2}`;
        }

        conteudoAviso.innerHTML = `<p>${mensagemFinal}.</p>`;
        divAviso.style.display = "block";
      }

      function reset() {
        document.getElementById("tipoLixo").value = "";
        document.getElementById("quantidade").value = "";
        document.getElementById("aviso").style.display = "none";
      }
    </script>
  </body>
</html>
